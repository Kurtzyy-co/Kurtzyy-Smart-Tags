<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    
    <!-- 👇 ADDED STYLE BLOCK 👇 -->
    <style>
      /* This instantly makes the background dark while waiting for JS to download */
      body {
        margin: 0;
        background-color: #020617; /* Slate-950 background */
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      
      /* This centers our temporary spinner */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
      }

      /* A simple blue spinner */
      .pre-loader {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        border-top-color: #3b82f6; 
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- 👆 END STYLE BLOCK 👆 -->

  </head>
  <body>
    <!-- 👇 PUT THE SPINNER INSIDE THE ROOT DIV 👇 -->
    <div id="root">
      <div class="pre-loader"></div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
